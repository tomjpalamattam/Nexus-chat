{% extends "base.html" %}

{% block title %}Create User — NexusChat{% endblock %}

{% block body %}
<style>
  .wrap { min-height: 100vh; display: grid; place-items: center; }
  .card { width: 400px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px; }
  .back { font-size: 13px; color: var(--text-muted); display: block; margin-bottom: 20px; }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 24px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 5px; }
  .errorlist { list-style: none; color: var(--red); font-size: 12px; margin-top: 4px; }
  .actions { display: flex; gap: 10px; margin-top: 8px; }
  select { width: 100%; }
</style>
<div class="wrap">
  <div class="card">
    <a href="{% url 'manage_users' %}" class="back">← Back to users</a>
    <h1>Create User</h1>
    <form method="post">
      {% csrf_token %}
      {% for field in form %}
      <div class="field">
        <label>{{ field.label }}</label>
        {{ field }}
        {{ field.errors }}
      </div>
      {% endfor %}
      {% if request.user.tier == 'A' %}
      <div class="field">
        <label>Tier</label>
        <select name="tier">
          <option value="B">B — Provider</option>
          <option value="C">C — End User</option>
        </select>
      </div>
      {% endif %}
      <div class="actions">
        <button type="submit" class="btn btn-primary">Create</button>
        <a href="{% url 'manage_users' %}" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
